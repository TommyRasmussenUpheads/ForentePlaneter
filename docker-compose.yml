services:

  # ── PostgreSQL ────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: forente_planeter_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: forente_planeter
      POSTGRES_USER: forente_planeter
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forente_planeter"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: forente_planeter_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ───────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forente_planeter_api
    restart: unless-stopped
    ports:
      - "3200:3200"
    environment:
      DATABASE_URL: postgresql+asyncpg://forente_planeter:${DB_PASSWORD}@db:5432/forente_planeter
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: bash -c "alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 3200 --reload"

  # ── Celery worker (tick-motor + tasks) ───────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forente_planeter_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://forente_planeter:${DB_PASSWORD}@db:5432/forente_planeter
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.worker worker --loglevel=info

  # ── Celery Beat (hourly tick scheduler) ──────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forente_planeter_beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://forente_planeter:${DB_PASSWORD}@db:5432/forente_planeter
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.worker beat --loglevel=info --scheduler celery.beat:PersistentScheduler

  # ── React frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forente_planeter_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3200
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  db_data:
  redis_data:
